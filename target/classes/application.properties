# Server
server.port=8080

# ============================================================
# TEMPORARY: Using H2 In-Memory Database for Testing
# ============================================================

# H2 In-Memory Database (for testing)
spring.datasource.url=jdbc:h2:file:C:/Users/Admin/test/expensedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# Disable Spring's SQL script initialization (let Hibernate create tables first)
spring.sql.init.mode=never

# H2 Console (access at http://localhost:8080/h2-console)

# JWT Secret Key (change in production)
jwt.secret=MySecretKeyForExpenseTrackerApplicationJWT2024
jwt.expiration=86400000


